<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hunter Craftsman 控制台</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #0d0d0d;
      --panel-2: #141414;
      --line: #2a2a2a;
      --soft: #9d9d9d;
      --text: #f5f5f5;
      --muted: #c7c7c7;
      --ok: #f5f5f5;
      --warn: #d0d0d0;
      --bad: #7f7f7f;
      --accent: #ffffff;
      --mono: "Consolas", "SFMono-Regular", "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--mono);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(180deg, #0b0b0b 0%, #040404 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      border: 1px solid var(--line);
      background: rgba(9, 9, 9, 0.9);
      padding: 16px 18px;
      margin-bottom: 16px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .title {
      font-size: 24px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .subtitle {
      color: var(--soft);
      font-size: 12px;
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button, input {
      font: inherit;
    }

    button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 8px 12px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    button:hover { border-color: var(--accent); }
    button:disabled { opacity: 0.45; cursor: wait; }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
    }

    .col {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .panel {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(22,22,22,0.92), rgba(7,7,7,0.95));
      overflow: hidden;
    }

    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.03);
    }

    .panel-title {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .panel-body {
      padding: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 12px;
      min-height: 88px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--soft);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      line-height: 1;
    }

    .stat-meta {
      font-size: 11px;
      color: var(--soft);
      margin-top: 8px;
    }

    .list {
      display: grid;
      gap: 10px;
      max-height: 460px;
      overflow: auto;
    }

    .item {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .item-top, .kv {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      border: 1px solid var(--line);
      padding: 2px 8px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .muted {
      color: var(--soft);
      font-size: 12px;
    }

    .id {
      word-break: break-all;
      font-size: 12px;
    }

    .timeline {
      display: grid;
      gap: 10px;
      max-height: 620px;
      overflow: auto;
    }

    .event {
      border-left: 2px solid var(--accent);
      padding-left: 10px;
    }

    .event .meta {
      color: var(--soft);
      font-size: 11px;
    }

    .empty {
      color: var(--soft);
      border: 1px dashed var(--line);
      padding: 16px;
      text-align: center;
    }

    /* ---------- 发布进度 popover ---------- */
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .overlay.open { display: flex; }

    .popover {
      border: 1px solid var(--line);
      background: var(--panel-2);
      padding: 18px;
      max-width: 520px;
      width: 90%;
      max-height: 80vh;
      overflow: auto;
    }
    .popover-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .progress-line {
      display: grid;
      gap: 6px;
    }
    .progress-step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 4px 0;
    }
    .progress-icon {
      width: 20px;
      text-align: center;
      flex-shrink: 0;
      font-size: 14px;
    }
    .progress-icon.done { color: #4caf50; }
    .progress-icon.current { color: #2196f3; animation: pulse 1.2s infinite; }
    .progress-icon.pending { color: var(--soft); }
    .progress-body { flex: 1; }
    .progress-phase { font-size: 12px; }
    .progress-detail { font-size: 11px; color: var(--soft); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ---------- 错误展开面板 ---------- */
    .expandable {
      border-top: 1px solid var(--line);
      margin-top: 8px;
      padding-top: 8px;
      display: none;
    }
    .expandable.open { display: block; }
    .expandable pre {
      margin: 0;
      font: inherit;
      font-size: 11px;
      color: var(--soft);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow: auto;
      background: var(--bg);
      padding: 8px;
      border: 1px solid var(--line);
    }

    /* ---------- Play Console 链接样式 ---------- */
    .play-link {
      color: #66bb6a;
      text-decoration: none;
      border: 1px solid #66bb6a;
      padding: 6px 10px;
      font-size: 11px;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .play-link:hover { background: rgba(102,187,106,0.1); }

    .footer {
      margin-top: 16px;
      color: var(--soft);
      font-size: 11px;
      text-align: right;
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      .shell { padding: 12px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>
        <div class="title">Hunter Craftsman 控制台</div>
        <div class="subtitle">查看 Agent A / B / C 运行状态、队列情况和发布流程</div>
      </div>
      <div class="actions">
        <label class="muted">自动刷新 <input id="autorefresh" type="checkbox" checked></label>
        <button id="refresh">刷新</button>
      </div>
    </div>

    <!-- 进度 popover 浮层 -->
    <div class="overlay" id="progressOverlay">
      <div class="popover" id="progressPopover"></div>
    </div>

    <div class="grid">
      <div class="col">
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">系统总览</div>
            <div class="muted" id="healthLine">加载中...</div>
          </div>
          <div class="panel-body">
            <div class="stats" id="stats"></div>
            <div class="timeline" id="opsChecks" style="margin-top:12px;"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">运行任务</div>
            <div class="muted" id="runCount"></div>
          </div>
          <div class="panel-body">
            <div class="list" id="runs"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">发布任务</div>
            <div class="muted" id="releaseCount"></div>
          </div>
          <div class="panel-body">
            <div class="list" id="releases"></div>
          </div>
        </section>
      </div>

      <div class="col">
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">当前运行时间线</div>
            <div class="muted" id="selectedRunLabel">尚未选择运行任务</div>
          </div>
          <div class="panel-body">
            <div class="timeline" id="timeline"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">当前运行审计</div>
            <div class="muted">交接记录与操作轨迹</div>
          </div>
          <div class="panel-body">
            <div class="timeline" id="runAudit"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">当前发布详情</div>
            <div class="muted" id="selectedReleaseLabel">尚未选择发布任务</div>
          </div>
          <div class="panel-body">
            <div class="timeline" id="releaseDetail"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">审计流</div>
            <div class="muted">最近的 agent 交接记录</div>
          </div>
          <div class="panel-body">
            <div class="timeline" id="audit"></div>
          </div>
        </section>
      </div>
    </div>

    <div class="footer" id="updatedAt">尚未同步</div>
  </div>

  <script>
    const state = {
      selectedRunId: null,
      selectedReleaseId: null,
      loading: false,
      timer: null,
    };

    const el = (id) => document.getElementById(id);

    const fmt = (value) => value == null || value === "" ? "-" : String(value);

    const BOOL_LABELS = {
      true: "是",
      false: "否"
    };

    const STATUS_LABELS = {
      implementation_complete: "实现完成",
      implementation_failed: "实现失败",
      in_progress: "进行中",
      pending: "等待中",
      queued: "已入队",
      failed: "失败",
      dead_letter: "死信",
      done: "完成",
      approved: "已批准",
      rejected: "已拒绝",
      prepared: "已准备",
      submitting: "提交中",
      published: "已发布",
      dry_run_complete: "演练完成",
      platform_unavailable: "平台不可用",
      accepted: "已接受",
      needs_clarification: "需要澄清",
      sync_implement: "同步实现",
      complete: "完成"
    };

    const PHASE_LABELS = {
      autopilot_discovery: "自动发现",
      analyze: "需求分析",
      analyze_result: "分析结果",
      clarify: "澄清修正",
      implement: "开始实现",
      spec_normalize: "需求标准化",
      plan: "规划",
      codegen: "代码生成",
      verify: "验证",
      package: "打包",
      complete: "完成",
      failed: "失败",
      queued: "排队中",
      release_prepare: "发布准备",
      release_approval: "发布审批",
      release_submit: "发布提交",
      release_poll: "发布轮询",
      release_complete: "发布完成",
      production_promote: "生产推进",
      terminal: "终态"
    };

    const EVENT_LABELS = {
      release_prepared: "发布准备完成",
      release_approval_recorded: "发布审批已记录",
      release_submit_queued: "发布提交已入队",
      release_submit_completed: "发布提交完成",
      release_requeued: "发布任务重新入队",
      release_jobs_repaired: "发布队列自动修复",
      run_queued: "运行任务已入队",
      run_requeued: "运行任务重新入队",
      run_sync_started: "同步运行开始",
      run_sync_completed: "同步运行完成"
    };

    function zh(value, mapping = STATUS_LABELS) {
      if (value === true || value === false) return BOOL_LABELS[String(value)];
      if (value == null || value === "") return "-";
      return mapping[value] || String(value);
    }

    function card(label, value, meta) {
      return `
        <div class="stat">
          <div class="stat-label">${label}</div>
          <div class="stat-value">${fmt(value)}</div>
          <div class="stat-meta">${fmt(meta)}</div>
        </div>
      `;
    }

    function badge(text) {
      return `<span class="badge">${fmt(text)}</span>`;
    }

    function renderSummary(summary) {
      const runCounts = summary.run_counts || {};
      const releaseCounts = summary.release_counts || {};
      const stats = [
        card("运行总数", summary.runs_total, `进行中 ${runCounts.in_progress || 0}`),
        card("死信任务", summary.dead_letter_runs, `发布死信 ${summary.dead_letter_releases}`),
        card("发布总数", summary.releases_total, `提交中 ${releaseCounts.submitting || 0}`),
        card("Worker 数", summary.job_worker_count, `租约 ${summary.job_lease_seconds}s`)
      ];
      el("stats").innerHTML = stats.join("");
      el("healthLine").textContent = `服务=${summary.service} 就绪=${zh(summary.ready, BOOL_LABELS)} Gate=${summary.gate_mode} 演练=${zh(summary.publisher_dry_run, BOOL_LABELS)}`;
      const checks = summary.checks || {};
      el("opsChecks").innerHTML = [
        `<div class="event"><div>工作区 :: ${zh(checks.workspace_ok, BOOL_LABELS)}</div><div class="meta">craftsman workspace 是否可用</div></div>`,
        `<div class="event"><div>回调目录 :: ${zh(checks.callbacks_ok, BOOL_LABELS)}</div><div class="meta">callbacks 目录是否可用</div></div>`,
        `<div class="event"><div>数据库 :: ${zh(checks.database_ok, BOOL_LABELS)}</div><div class="meta">sqlite 是否可连接</div></div>`,
        `<div class="event"><div>已修复任务 :: ${fmt(summary.repaired_release_jobs)}</div><div class="meta">本次请求顺手修复的历史发布脏状态</div></div>`
      ].join("");
    }

    function renderRuns(runs) {
      el("runCount").textContent = `最近 ${runs.length} 条`;
      if (!runs.length) {
        el("runs").innerHTML = '<div class="empty">暂时还没有运行任务</div>';
        return;
      }
      el("runs").innerHTML = runs.map((run) => `
        <div class="item">
          <div class="item-top">
            <strong>${fmt(run.opportunity_id)}</strong>
            <div>
              ${badge(zh(run.status))}
              ${badge(zh(run.phase, PHASE_LABELS))}
            </div>
          </div>
          <div class="id">${fmt(run.run_id)}</div>
          <div class="kv">
            <span class="muted">版本 ${fmt(run.revision)} | 尝试 ${fmt(run.job?.attempts)}/${fmt(run.job?.max_attempts)}</span>
            <div>
              <button data-open-run="${run.run_id}">时间线</button>
              <button data-requeue-run="${run.run_id}" ${run.can_requeue ? "" : "disabled"}>重新入队</button>
            </div>
          </div>
          <div class="muted">${fmt(run.phase_detail)}</div>
          <div class="muted">更新时间 ${fmt(run.updated_at)}</div>
        </div>
      `).join("");
    }

    function renderReleases(releases) {
      el("releaseCount").textContent = `最近 ${releases.length} 条`;
      if (!releases.length) {
        el("releases").innerHTML = '<div class="empty">暂时还没有发布任务</div>';
        return;
      }
      el("releases").innerHTML = releases.map((release) => `
        <div class="item" data-release-id="${release.release_id}">
          <div class="item-top">
            <strong>${fmt(release.release_id)}</strong>
            <div>
              ${badge(zh(release.status))}
              ${badge(release.platform_target === "android" ? "安卓" : release.platform_target === "ios" ? "iOS" : "未知")}
            </div>
          </div>
          <div class="muted">${fmt(release.message)}</div>
          <div class="muted">策略通过 ${zh(release.policy_passed, BOOL_LABELS)} | 审批 ${zh(release.approval_decision)}</div>
          <div class="kv">
            <span class="muted">Agent C ${zh(release.agent_c_status)} | 尝试 ${fmt(release.job?.attempts)}/${fmt(release.job?.max_attempts)}</span>
            <div>
              <button data-open-release="${release.release_id}">详情</button>
              <button data-progress-release="${release.release_id}">进度</button>
              <button data-approve-release="${release.release_id}" ${release.approval_decision === "approved" ? "disabled" : ""}>批准</button>
              <button data-reject-release="${release.release_id}" ${release.status === "rejected" ? "disabled" : ""}>拒绝</button>
              <button data-submit-release="${release.release_id}" ${release.policy_passed === false ? "disabled" : ""}>提交</button>
              <button data-requeue-release="${release.release_id}" ${release.can_requeue ? "" : "disabled"}>重新入队</button>
            </div>
          </div>
          <div class="muted">更新时间 ${fmt(release.updated_at)}</div>
        </div>
      `).join("");
    }

    function renderTimeline(events, selectedRunId) {
      el("selectedRunLabel").textContent = selectedRunId || "尚未选择运行任务";
      if (!events.length) {
        el("timeline").innerHTML = '<div class="empty">选择一个运行任务后，这里会显示阶段时间线</div>';
        return;
      }
      el("timeline").innerHTML = events.map((event) => `
        <div class="event">
          <div>${zh(event.phase, PHASE_LABELS)} :: ${fmt(event.detail)}</div>
          <div class="meta">#${fmt(event.id)} 于 ${fmt(event.created_at)}</div>
        </div>
      `).join("");
    }

    function renderAudit(events) {
      if (!events.length) {
        el("audit").innerHTML = '<div class="empty">暂时还没有审计事件</div>';
        return;
      }
      el("audit").innerHTML = events.map((event) => `
        <div class="event">
          <div>${zh(event.event_type, EVENT_LABELS)} ${event.run_id ? `:: ${event.run_id}` : event.release_id ? `:: ${event.release_id}` : ""}</div>
          <div class="meta">${fmt(event.actor)} 于 ${fmt(event.created_at)}</div>
        </div>
      `).join("");
    }

    function renderRunAudit(events) {
      if (!events.length) {
        el("runAudit").innerHTML = '<div class="empty">当前运行任务还没有审计记录</div>';
        return;
      }
      el("runAudit").innerHTML = events.map((event) => `
        <div class="event">
          <div>${zh(event.event_type, EVENT_LABELS)}</div>
          <div class="meta">${fmt(event.actor)} 于 ${fmt(event.created_at)}</div>
        </div>
      `).join("");
    }

    function renderReleaseDetail(data, selectedReleaseId) {
      el("selectedReleaseLabel").textContent = selectedReleaseId || "尚未选择发布任务";
      if (!data) {
        el("releaseDetail").innerHTML = '<div class="empty">选择一个发布任务后，这里会显示策略、审批、队列和 Agent C 详情</div>';
        return;
      }
      const release = data.release || {};
      const policy = data.policy || {};
      const approval = data.approval || {};
      const job = data.job || {};
      const detail = release.details || {};
      const agentC = detail.agent_c || {};
      const issues = policy.issues || [];
      const audit = data.audit || [];
      const agentCStatus = agentC.agent_c_status || "";

      // Play Console 链接
      let playLink = "";
      const pkg = agentC?.upload?.store_response?.package_name;
      if (pkg && (agentCStatus === "submitted" || agentCStatus === "published" || agentCStatus === "dry_run_complete")) {
        playLink = `
          <div class="event">
            <div>Play Console</div>
            <div class="meta">
              <a class="play-link" href="https://play.google.com/console/developers/${fmt(pkg)}" target="_blank" rel="noopener">在 Play Console 中查看</a>
            </div>
          </div>`;
      }

      // Production 推进状态
      let productionLine = "";
      const prod = agentC?.production || {};
      if (prod && prod.promoted_to_production !== undefined) {
        const prodIcon = prod.promoted_to_production ? "\u2713" : "\u2717";
        const prodColor = prod.promoted_to_production ? "#66bb6a" : "#e57373";
        productionLine = `
          <div class="event">
            <div>Production :: <span style="color:${prodColor}">${prodIcon} ${prod.promoted_to_production ? "已提交审核" : "推进失败"}</span></div>
            <div class="meta">${fmt(prod.message)}</div>
          </div>`;
      }

      // 错误详情
      let errorPanel = "";
      const reasons = agentC?.reasons || [];
      const buildLog = agentC?.build_log || "";
      const errorMsg = release.message || job.last_error || "";
      if (agentCStatus === "failed" || release.status === "failed" || reasons.length > 0 || buildLog || errorMsg) {
        const errBody = [
          reasons.length ? `原因: ${reasons.join(" | ")}` : "",
          buildLog ? `构建日志:\n${buildLog}` : "",
          errorMsg && !reasons.includes(errorMsg) ? `错误: ${errorMsg}` : "",
        ].filter(Boolean).join("\n\n");
        errorPanel = `
          <div class="event">
            <div>
              <button data-toggle-error="${selectedReleaseId}" style="font-size:11px;padding:4px 8px;">
                错误详情 ${badge("展开")}
              </button>
            </div>
            <div class="expandable" id="errPanel-${selectedReleaseId.replace(/[^a-zA-Z0-9-]/g, "")}">
              <pre>${fmt(errBody) || "无详细信息"}</pre>
            </div>
          </div>`;
      }

      const rows = [
        `<div class="event"><div>状态 :: ${zh(release.status)}</div><div class="meta">更新时间 ${fmt(release.updated_at)}</div></div>`,
        `<div class="event"><div>策略检查 :: 通过=${zh(policy.passed, BOOL_LABELS)}</div><div class="meta">${issues.length ? issues.join(" | ") : "没有策略问题"}</div></div>`,
        `<div class="event"><div>审批 :: ${zh(approval.decision)}</div><div class="meta">${fmt(approval.approved_by)} ${approval.approved_at ? `于 ${fmt(approval.approved_at)}` : ""}</div></div>`,
        `<div class="event"><div>队列 :: ${zh(job.status)}</div><div class="meta">尝试 ${fmt(job.attempts)}/${fmt(job.max_attempts)} ${job.last_error ? `| ${fmt(job.last_error)}` : ""}</div></div>`,
        `<div class="event"><div>平台 :: ${detail.platform_target === "android" ? "安卓" : detail.platform_target === "ios" ? "iOS" : fmt(detail.platform_target)}</div><div class="meta">${fmt(detail.message)}</div></div>`,
        `<div class="event"><div>Agent C :: ${zh(agentCStatus)}</div><div class="meta">审计事件数 ${fmt(audit.length)}</div></div>`,
        productionLine,
        playLink,
        errorPanel,
      ];
      el("releaseDetail").innerHTML = rows.filter(Boolean).join("");
    }

    async function request(path, options = {}) {
      const resp = await fetch(path, {
        ...options,
        headers: { "Content-Type": "application/json", ...(options.headers || {}) }
      });
      if (!resp.ok) {
        const payload = await resp.json().catch(() => ({}));
        throw new Error(payload?.detail?.error?.message || `HTTP ${resp.status}`);
      }
      return resp.json();
    }

    async function loadDashboard() {
      if (state.loading) return;
      state.loading = true;
      try {
        const data = await request("/dashboard/api/overview");
        renderSummary(data.summary || {});
        renderRuns(data.runs || []);
        renderReleases(data.releases || []);
        renderAudit(data.audit || []);

        const runId = state.selectedRunId || data.runs?.[0]?.run_id || null;
        state.selectedRunId = runId;
        if (runId) {
          const detail = await request(`/dashboard/api/runs/${encodeURIComponent(runId)}`);
          renderTimeline(detail.events || [], runId);
          renderRunAudit(detail.audit || []);
        } else {
          renderTimeline([], null);
          renderRunAudit([]);
        }
        const releaseId = state.selectedReleaseId || data.releases?.[0]?.release_id || null;
        state.selectedReleaseId = releaseId;
        if (releaseId) {
          const detail = await request(`/dashboard/api/releases/${encodeURIComponent(releaseId)}`);
          renderReleaseDetail(detail, releaseId);
        } else {
          renderReleaseDetail(null, null);
        }
        el("updatedAt").textContent = `最近同步时间 ${new Date().toLocaleString()}`;
      } catch (error) {
        el("updatedAt").textContent = `同步失败：${error.message}`;
      } finally {
        state.loading = false;
      }
    }

    async function requeueRun(runId) {
      await request(`/dashboard/api/runs/${encodeURIComponent(runId)}/requeue`, { method: "POST" });
      state.selectedRunId = runId;
      await loadDashboard();
    }

    async function requeueRelease(releaseId) {
      await request(`/dashboard/api/releases/${encodeURIComponent(releaseId)}/requeue`, { method: "POST" });
      await loadDashboard();
    }

    async function decideRelease(releaseId, decision, note) {
      await request(`/dashboard/api/releases/${encodeURIComponent(releaseId)}/decision`, {
        method: "POST",
        body: JSON.stringify({ approved_by: "dashboard-operator", decision, note })
      });
      state.selectedReleaseId = releaseId;
      await loadDashboard();
    }

    async function approveRelease(releaseId) {
      await decideRelease(releaseId, "approved", "由控制台批准");
    }

    async function rejectRelease(releaseId) {
      await decideRelease(releaseId, "rejected", "由控制台拒绝");
    }

    async function submitRelease(releaseId) {
      await request(`/dashboard/api/releases/${encodeURIComponent(releaseId)}/submit`, { method: "POST" });
      state.selectedReleaseId = releaseId;
      await loadDashboard();
    }

    // ---- 进度 popover ----
    async function showProgress(releaseId) {
      const detail = await request(`/dashboard/api/releases/${encodeURIComponent(releaseId)}`);
      const agentC = detail?.release?.details?.agent_c || {};
      const phases = agentC.phases || [];
      const agentCStatus = agentC.agent_c_status || "";

      // 如果 phases 为空，从 release 状态推断
      const isRunning = ["prepared", "submitting"].includes(detail?.release?.status || "");
      const isDone = ["published", "dry_run_complete", "failed"].includes(detail?.release?.status || "");

      let steps = [];
      if (phases.length > 0) {
        // 使用真实 phases
        const phaseNames = phases.map(p => p.phase || "");
        const allPhases = ["validate", "sign", "build", "upload", "complete", "failed"];
        const seen = new Set(phaseNames);
        for (const pn of allPhases) {
          const detailObj = phases.find(p => p.phase === pn);
          steps.push({
            phase: pn,
            detail: detailObj?.detail || "",
            status: seen.has(pn) ? (pn === "failed" ? "failed" : "done") : (agentCStatus === "failed" && !seen.has(pn) ? "cancelled" : "pending"),
          });
        }
      } else {
        // 从状态推断
        steps = [
          { phase: "validate", detail: "验证 release_handoff", status: isDone || isRunning ? "done" : "pending" },
          { phase: "sign", detail: "配置签名", status: isDone || isRunning ? "done" : "pending" },
          { phase: "build", detail: "Gradle 构建 AAB", status: isDone || isRunning ? "done" : "pending" },
          { phase: "upload", detail: "上传到 Google Play", status: isDone ? "done" : isRunning ? "current" : "pending" },
          { phase: "complete", detail: agentCStatus === "failed" ? "发布失败" : agentCStatus === "dry_run_complete" ? "演练完成" : "发布完成", status: isDone ? (agentCStatus === "failed" ? "failed" : "done") : "pending" },
        ];
      }

      // 如果没有 current 且有 running，最后一个 pending 视为 current
      if (!steps.some(s => s.status === "current") && (isRunning)) {
        for (let i = steps.length - 1; i >= 0; i--) {
          if (steps[i].status === "pending") { steps[i].status = "current"; break; }
        }
      }

      const icons = { done: "\u2713", current: "\u23f3", pending: "\u25cb", failed: "\u2717", cancelled: "\u2014" };
      const iconClass = { done: "done", current: "current", pending: "pending", failed: "done", cancelled: "pending" };
      const phaseLabels = {
        validate: "验证", sign: "签名", build: "构建", upload: "上传",
        complete: "完成", failed: "失败", production: "生产"
      };

      el("progressPopover").innerHTML = `
        <div class="popover-head">
          <div class="panel-title">发布进度</div>
          <button id="closeProgress">关闭</button>
        </div>
        <div class="muted" style="margin-bottom:10px;">release_id: ${fmt(releaseId)}</div>
        <div class="progress-line">
          ${steps.map(s => `
            <div class="progress-step">
              <div class="progress-icon ${iconClass[s.status]}">${icons[s.status]}</div>
              <div class="progress-body">
                <div class="progress-phase">${phaseLabels[s.phase] || s.phase}</div>
                <div class="progress-detail">${fmt(s.detail) || ""}</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
      el("progressOverlay").classList.add("open");
    }

    el("progressOverlay").addEventListener("click", (e) => {
      if (e.target === el("progressOverlay") || e.target.id === "closeProgress") {
        el("progressOverlay").classList.remove("open");
      }
    });

    // ---- 错误面板切换 ----
    function toggleError(releaseId) {
      const safeId = releaseId.replace(/[^a-zA-Z0-9-]/g, "");
      const panel = document.getElementById("errPanel-" + safeId);
      if (panel) {
        panel.classList.toggle("open");
        const btn = document.querySelector(`[data-toggle-error="${releaseId}"]`);
        if (btn) {
          const badgeEl = btn.querySelector(".badge");
          if (badgeEl) badgeEl.textContent = panel.classList.contains("open") ? "收起" : "展开";
        }
      }
    }

    document.addEventListener("click", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const runId = target.getAttribute("data-open-run");
      if (runId) {
        state.selectedRunId = runId;
        const detail = await request(`/dashboard/api/runs/${encodeURIComponent(runId)}`);
        renderTimeline(detail.events || [], runId);
        renderRunAudit(detail.audit || []);
      }
      const releaseId = target.getAttribute("data-open-release");
      if (releaseId) {
        state.selectedReleaseId = releaseId;
        const detail = await request(`/dashboard/api/releases/${encodeURIComponent(releaseId)}`);
        renderReleaseDetail(detail, releaseId);
      }
      const approveReleaseId = target.getAttribute("data-approve-release");
      if (approveReleaseId) {
        target.setAttribute("disabled", "disabled");
        try { await approveRelease(approveReleaseId); } finally { target.removeAttribute("disabled"); }
      }
      const rejectReleaseId = target.getAttribute("data-reject-release");
      if (rejectReleaseId) {
        target.setAttribute("disabled", "disabled");
        try { await rejectRelease(rejectReleaseId); } finally { target.removeAttribute("disabled"); }
      }
      const submitReleaseId = target.getAttribute("data-submit-release");
      if (submitReleaseId) {
        target.setAttribute("disabled", "disabled");
        try { await submitRelease(submitReleaseId); } finally { target.removeAttribute("disabled"); }
      }
      const rqRun = target.getAttribute("data-requeue-run");
      if (rqRun) {
        target.setAttribute("disabled", "disabled");
        try { await requeueRun(rqRun); } finally { target.removeAttribute("disabled"); }
      }
      const rqRelease = target.getAttribute("data-requeue-release");
      if (rqRelease) {
        target.setAttribute("disabled", "disabled");
        try { await requeueRelease(rqRelease); } finally { target.removeAttribute("disabled"); }
      }
      const progressRelease = target.getAttribute("data-progress-release");
      if (progressRelease) {
        await showProgress(progressRelease);
      }
      const toggleErr = target.getAttribute("data-toggle-error");
      if (toggleErr) {
        toggleError(toggleErr);
      }
    });

    el("refresh").addEventListener("click", loadDashboard);
    el("autorefresh").addEventListener("change", () => {
      if (state.timer) clearInterval(state.timer);
      if (el("autorefresh").checked) {
        state.timer = setInterval(loadDashboard, 4000);
      }
    });

    state.timer = setInterval(loadDashboard, 4000);
    loadDashboard();
  </script>
</body>
</html>
